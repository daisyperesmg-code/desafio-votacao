#spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

spring.datasource.url=jdbc:postgresql://localhost:5432/votacao
#spring.datasource.url=jdbc:postgresql://postgres:5432/votacao
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.root=INFO
logging.level.com.example.votacao=DEBUG
logging.level.org.springframework.web=ERROR

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n

logging.file.name=logs/app.log

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7


